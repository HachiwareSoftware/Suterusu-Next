name: Build and Release

on:
  push:
    branches: [ master ]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2

    - name: Setup .NET 10 SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore NuGet packages
      run: nuget restore Suterusu-Next.sln

    - name: Build
      run: msbuild Suterusu-Next.sln /t:Build /p:Configuration=Release /v:minimal

    - name: Build Windows AI OCR helper
      run: dotnet build Suterusu.WindowsAiOcr\Suterusu.WindowsAiOcr.csproj --configuration Release

    - name: Run tests
      run: dotnet test Suterusu.Tests\Suterusu.Tests.csproj --no-build --configuration Release

    - name: Package artifacts
      shell: pwsh
      run: |
        $version = "1.0.${{ github.run_number }}"
        New-Item -ItemType Directory -Force -Path dist

        # Full package — includes WindowsAiOcr helper
        $fullDist = "dist\full"
        New-Item -ItemType Directory -Force -Path $fullDist
        Copy-Item Suterusu\bin\Release\Suterusu.exe $fullDist\
        Copy-Item Suterusu\bin\Release\*.dll $fullDist\
        Copy-Item Suterusu\bin\Release\Suterusu.exe.config $fullDist\
        if (Test-Path "Suterusu\bin\Release\NLog.config") { Copy-Item Suterusu\bin\Release\NLog.config $fullDist\ }
        if (Test-Path "Suterusu\bin\Release\WindowsAiOcr") { Copy-Item Suterusu\bin\Release\WindowsAiOcr $fullDist\WindowsAiOcr -Recurse }
        Compress-Archive -Path "$fullDist\*" -DestinationPath "dist\Suterusu-v$version.zip"

        # Lite package — no WindowsAiOcr helper
        $liteDist = "dist\lite"
        New-Item -ItemType Directory -Force -Path $liteDist
        Copy-Item Suterusu\bin\Release\Suterusu.exe $liteDist\
        Copy-Item Suterusu\bin\Release\*.dll $liteDist\
        Copy-Item Suterusu\bin\Release\Suterusu.exe.config $liteDist\
        if (Test-Path "Suterusu\bin\Release\NLog.config") { Copy-Item Suterusu\bin\Release\NLog.config $liteDist\ }
        Compress-Archive -Path "$liteDist\*" -DestinationPath "dist\Suterusu-v$version-lite.zip"

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v1.0.${{ github.run_number }}
        name: Suterusu v1.0.${{ github.run_number }}
        body: |
          Automated build from commit ${{ github.sha }}

          ## What's changed
          ${{ github.event.head_commit.message }}

          ## Downloads
          - **Suterusu-v${{ github.run_number }}.zip** — Full package includes Windows AI OCR helper (requires Copilot+ PC with NPU)
          - **Suterusu-v${{ github.run_number }}-lite.zip** — Lightweight package without the Windows AI OCR helper
        files: |
          dist/Suterusu-v1.0.${{ github.run_number }}.zip
          dist/Suterusu-v1.0.${{ github.run_number }}-lite.zip
        generate_release_notes: true
